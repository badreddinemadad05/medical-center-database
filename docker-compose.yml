version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mysql_hospital
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hospital_database
      MYSQL_USER: youssef
      MYSQL_PASSWORD: youssef0000
    ports:
      - "3306:3306"
    volumes:
      - ./BD_Groupe20.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password

  app:
    build: .
    depends_on:
      - db
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
